name: fill-e2e
description: E2Eテスト不足分の重点追加。UX全ルートをコードから深掘りし、テストケースをリスト管理して全件実装する
piece_config:
  provider_options:
    codex:
      network_access: true
    opencode:
      network_access: true
max_movements: 20
initial_movement: plan_test

loop_monitors:
  - cycle:
      - ai_review
      - ai_fix
    threshold: 3
    judge:
      persona: supervisor
      instruction: |
        ai_review と ai_fix のループが {cycle_count} 回繰り返されました。

        各サイクルのレポートを確認し、このループが健全（進捗がある）か、
        非生産的（同じ問題を繰り返している）かを判断してください。

        **参照するレポート:**
        - AIレビュー結果: {report:ai-review.md}

        **判断基準:**
        - 各サイクルで新しい問題が発見・修正されているか
        - 同じ指摘が繰り返されていないか
        - 修正が実際に反映されているか
      rules:
        - condition: 健全（進捗あり）
          next: ai_review
        - condition: 非生産的（改善なし）
          next: review_test

movements:
  - name: plan_test
    persona: test-planner
    policy: testing
    knowledge:
      - architecture
      - e2e-testing
    instruction: e2e-coverage-plan
    edit: false
    output_contracts:
      report:
        - name: 01-e2e-coverage-plan.md
          format: e2e-coverage-plan
    rules:
      - condition: テストケースリストの作成完了
        next: implement_test
      - condition: 要件が不明確、情報不足
        next: ABORT

  - name: implement_test
    persona: coder
    policy:
      - coding
      - testing
    knowledge:
      - architecture
      - e2e-testing
    instruction: e2e-coverage-implement
    edit: true
    session: refresh
    required_permission_mode: edit
    quality_gates:
      - E2Eテストが全件パスすること
      - 既存テストが壊れていないこと
    rules:
      - condition: テストケースリストの全件実装完了
        next: ai_review
      - condition: 一部実装完了（残りあり）
        next: ai_review

  - name: ai_review
    edit: false
    persona: ai-antipattern-reviewer
    policy:
      - review
      - ai-antipattern
    knowledge:
      - e2e-testing
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - WebSearch
          - WebFetch
    rules:
      - condition: AI特有の問題なし
        next: review_test
      - condition: AI特有の問題あり
        next: ai_fix
    instruction: ai-review
    output_contracts:
      report:
        - name: ai-review.md
          format: ai-review

  - name: ai_fix
    edit: true
    persona: coder
    policy:
      - coding
      - testing
    session: refresh
    knowledge:
      - architecture
      - e2e-testing
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
          - WebSearch
          - WebFetch
    required_permission_mode: edit
    pass_previous_response: false
    rules:
      - condition: AI問題の修正完了
        next: ai_review
      - condition: 修正不要（指摘対象ファイル/仕様の確認済み）
        next: ai_no_fix
      - condition: 判断できない、情報不足
        next: ai_no_fix
    instruction: ai-fix

  - name: ai_no_fix
    edit: false
    persona: architecture-reviewer
    policy: review
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
    rules:
      - condition: ai_reviewの指摘が妥当（修正すべき）
        next: ai_fix
      - condition: ai_fixの判断が妥当（修正不要）
        next: review_test
    instruction: arbitrate

  - name: review_test
    edit: false
    persona: qa-reviewer
    policy:
      - review
      - qa
    knowledge:
      - e2e-testing
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - WebSearch
          - WebFetch
    rules:
      - condition: approved
        next: supervise
      - condition: needs_fix
        next: fix
    instruction: review-test
    output_contracts:
      report:
        - name: qa-review.md
          format: qa-review

  - name: fix
    edit: true
    persona: coder
    policy:
      - coding
      - testing
    session: refresh
    knowledge:
      - architecture
      - e2e-testing
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
          - WebSearch
          - WebFetch
    required_permission_mode: edit
    pass_previous_response: false
    rules:
      - condition: 修正完了
        next: review_test
      - condition: 判断できない、情報不足
        next: plan_test
    instruction: fix

  - name: supervise
    edit: false
    persona: supervisor
    policy: review
    knowledge:
      - e2e-testing
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Bash
          - WebSearch
          - WebFetch
    instruction: e2e-coverage-supervise
    pass_previous_response: false
    rules:
      - condition: テストケースリスト全件が実装済みでテストもパス
        next: COMPLETE
      - condition: 未実装のテストケースがある、テスト失敗、品質問題
        next: implement_test
    output_contracts:
      report:
        - name: supervisor-validation.md
          format: supervisor-validation
        - name: summary.md
          format: summary
          use_judge: false
