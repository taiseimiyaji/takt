name: fill-e2e
description: Intensive E2E test gap filling. Deep-dives into all UX routes from code, manages test cases as a list, and implements all of them
piece_config:
  provider_options:
    codex:
      network_access: true
    opencode:
      network_access: true
max_movements: 20
initial_movement: plan_test

loop_monitors:
  - cycle:
      - ai_review
      - ai_fix
    threshold: 3
    judge:
      persona: supervisor
      instruction: |
        The ai_review ↔ ai_fix loop has repeated {cycle_count} times.

        Review the reports from each cycle and determine whether this loop
        is healthy (making progress) or unproductive (repeating the same issues).

        **Reports to reference:**
        - AI Review results: {report:ai-review.md}

        **Judgment criteria:**
        - Are new issues being found/fixed in each cycle?
        - Are the same findings being repeated?
        - Are fixes actually being applied?
      rules:
        - condition: Healthy (making progress)
          next: ai_review
        - condition: Unproductive (no improvement)
          next: review_test

movements:
  - name: plan_test
    persona: test-planner
    policy: testing
    knowledge:
      - architecture
      - e2e-testing
    instruction: e2e-coverage-plan
    edit: false
    output_contracts:
      report:
        - name: 01-e2e-coverage-plan.md
          format: e2e-coverage-plan
    rules:
      - condition: Test case list creation complete
        next: implement_test
      - condition: Requirements unclear or insufficient information
        next: ABORT

  - name: implement_test
    persona: coder
    policy:
      - coding
      - testing
    knowledge:
      - architecture
      - e2e-testing
    instruction: e2e-coverage-implement
    edit: true
    session: refresh
    required_permission_mode: edit
    quality_gates:
      - All E2E tests pass
      - Existing tests are not broken
    rules:
      - condition: All test cases from the list implemented
        next: ai_review
      - condition: Partially implemented (remaining cases exist)
        next: ai_review

  - name: ai_review
    edit: false
    persona: ai-antipattern-reviewer
    policy:
      - review
      - ai-antipattern
    knowledge:
      - e2e-testing
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - WebSearch
          - WebFetch
    rules:
      - condition: No AI-specific issues
        next: review_test
      - condition: AI-specific issues found
        next: ai_fix
    instruction: ai-review
    output_contracts:
      report:
        - name: ai-review.md
          format: ai-review

  - name: ai_fix
    edit: true
    persona: coder
    policy:
      - coding
      - testing
    session: refresh
    knowledge:
      - architecture
      - e2e-testing
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
          - WebSearch
          - WebFetch
    required_permission_mode: edit
    pass_previous_response: false
    rules:
      - condition: AI issues fixed
        next: ai_review
      - condition: No fix needed (verified target files/spec)
        next: ai_no_fix
      - condition: Cannot proceed, insufficient info
        next: ai_no_fix
    instruction: ai-fix

  - name: ai_no_fix
    edit: false
    persona: architecture-reviewer
    policy: review
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
    rules:
      - condition: ai_review's findings are valid (fix required)
        next: ai_fix
      - condition: ai_fix's judgment is valid (no fix needed)
        next: review_test
    instruction: arbitrate

  - name: review_test
    edit: false
    persona: qa-reviewer
    policy:
      - review
      - qa
    knowledge:
      - e2e-testing
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - WebSearch
          - WebFetch
    rules:
      - condition: approved
        next: supervise
      - condition: needs_fix
        next: fix
    instruction: review-test
    output_contracts:
      report:
        - name: qa-review.md
          format: qa-review

  - name: fix
    edit: true
    persona: coder
    policy:
      - coding
      - testing
    session: refresh
    knowledge:
      - architecture
      - e2e-testing
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
          - WebSearch
          - WebFetch
    required_permission_mode: edit
    pass_previous_response: false
    rules:
      - condition: Fix complete
        next: review_test
      - condition: Cannot proceed, insufficient info
        next: plan_test
    instruction: fix

  - name: supervise
    edit: false
    persona: supervisor
    policy: review
    knowledge:
      - e2e-testing
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Bash
          - WebSearch
          - WebFetch
    instruction: e2e-coverage-supervise
    pass_previous_response: false
    rules:
      - condition: All test cases from the list are implemented and tests pass
        next: COMPLETE
      - condition: Unimplemented test cases exist, tests failing, quality issues
        next: implement_test
    output_contracts:
      report:
        - name: supervisor-validation.md
          format: supervisor-validation
        - name: summary.md
          format: summary
          use_judge: false
